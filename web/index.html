<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Vélivert — Web</title>
<style>
  :root {
    --bg: #0d0d0d;
    --card: #1a1a1a;
    --text: #e0e0e0;
    --text-secondary: #999;
    --accent: #00c853;
    --accent-warn: #ff6d00;
    --separator: #2a2a2a;
    --radius-default: 8px;
    --font-body: "FK Grotesk Neue", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); padding: 16px; max-width: 480px; margin: 0 auto; -webkit-tap-highlight-color: transparent; }
  h1 { font-size: 28px; font-weight: 700; margin-bottom: 2px; }
  .subtitle { color: var(--text-secondary); font-size: 13px; margin-bottom: 20px; }
  .card { background: var(--card); border-radius: var(--radius-default); padding: 16px; margin-bottom: 12px; }
  .card-header { font-size: 11px; text-transform: uppercase; color: var(--text-secondary); letter-spacing: 0.5px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
  .row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--separator); cursor: pointer; -webkit-user-select: none; }
  .row:last-child { border-bottom: none; }
  .row:active { opacity: 0.7; }
  .row-name { font-size: 16px; font-weight: 600; }
  .row-address { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .row-right { text-align: right; }
  .row-distance { font-size: 16px; font-weight: 700; color: var(--accent); }
  .row-bikes { font-size: 13px; color: var(--text-secondary); }
  .row-bikes.zero { color: var(--accent-warn); }
  .chevron { font-size: 20px; color: var(--text-secondary); margin-left: 8px; }
  footer { text-align: center; color: #444; font-size: 11px; margin-top: 24px; padding-bottom: 32px; }
  .hidden { display: none !important; }
  .refresh-btn { background: none; border: 1px solid var(--separator); color: var(--text-secondary); padding: 4px 12px; border-radius: var(--radius-default); font-size: 13px; cursor: pointer; font-family: var(--font-body); }
  .refresh-btn:active { background: var(--separator); }
  .empty-state { text-align: center; padding: 24px 0; color: var(--text-secondary); font-size: 14px; }
  .fav-cb { width: 22px; height: 22px; accent-color: var(--accent); cursor: pointer; margin-right: 10px; flex-shrink: 0; }
  .detail-header { margin-bottom: 16px; }
  .detail-back { color: var(--accent); font-size: 15px; cursor: pointer; background: none; border: none; font-family: var(--font-body); padding: 0; margin-bottom: 8px; display: inline-block; }
  .detail-back:active { opacity: 0.7; }
  .detail-name { font-size: 22px; font-weight: 700; margin-top: 4px; }
  .detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--separator); }
  .detail-row:last-child { border-bottom: none; }
  .detail-label { color: var(--text-secondary); font-size: 14px; }
  .detail-value { font-size: 14px; font-weight: 600; }
</style>
</head>
<body>
<div id="main-panel">
<h1>Vélivert</h1>
<p class="subtitle" id="status-text">Stations à proximité</p>
<div class="card">
<div class="card-header"><span>LES PLUS PROCHES (<span id="stations-count">0</span>)</span><button class="refresh-btn" onclick="loadStations()">↻</button></div>
<div id="stations-list"><div class="empty-state">Chargement...</div></div></div>
<div class="card hidden" id="favs-card">
<div class="card-header"><span>FAVORIS (<span id="favs-count">0</span>)</span></div>
<div id="favs-list"></div></div>
<div class="card">
<div class="card-header" onclick="toggleAllStations()" style="cursor:pointer">
<span>TOUTES LES STATIONS (<span id="all-count">0</span>) <span id="all-arrow">▼</span></span>
<span id="fav-count" style="color:var(--accent);font-size:11px"></span></div>
<div id="all-stations-list" style="max-height:300px;overflow-y:auto;display:none"><div class="empty-state">Chargement...</div></div></div></div>
<div id="detail-panel" class="hidden">
<div class="detail-header"><button class="detail-back" onclick="hideDetail()">← Retour</button><div class="detail-name" id="detail-name"></div></div>
<div class="card">
<div class="detail-row"><span class="detail-label">Adresse</span><span class="detail-value" id="detail-address"></span></div>
<div class="detail-row"><span class="detail-label">Distance</span><span class="detail-value" id="detail-distance"></span></div>
<div class="detail-row"><span class="detail-label">Vélos disponibles</span><span class="detail-value" id="detail-bikes"></span></div>
<div class="detail-row"><span class="detail-label">Places libres</span><span class="detail-value" id="detail-docks"></span></div>
<div class="detail-row"><span class="detail-label">Capacité</span><span class="detail-value" id="detail-capacity"></span></div></div></div>
<footer>Vélivert v1.1.2 · <a href="https://github.com/Lupin/velivert" style="color:#555">GitHub</a></footer>
<script>
(function() {
  'use strict';
  var stores = [], allStations = [], sortedStations = [], favorites = {};
  var CENTER_LAT = 45.4397, CENTER_LON = 4.3872;

  function L() { try { var r=localStorage.getItem('velivert-favs'); if(r) favorites=JSON.parse(r) } catch(e){ favorites={} } }
  function S() { try { localStorage.setItem('velivert-favs',JSON.stringify(favorites)) } catch(e){} }
  function E(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
  function H(a,b,c,d){ var R=6371000,p=Math.PI/180,x=(c-a)*p,y=(d-b)*p,sa=a*p,sc=c*p,sx=Math.sin(x/2),sy=Math.sin(y/2); return R*2*Math.atan2(Math.sqrt(sx*sx+Math.cos(sa)*Math.cos(sc)*sy*sy),Math.sqrt(1-(sx*sx+Math.cos(sa)*Math.cos(sc)*sy*sy))) }

  function loadStations() {
    document.getElementById('status-text').textContent = 'Chargement...';
    FC(CENTER_LAT, CENTER_LON);
  }

  function FC(lat,lon) {
    var U='https://api.saint-etienne-metropole.fr/velivert/api/station_information.json';
    var V='https://api.saint-etienne-metropole.fr/velivert/api/station_status.json';
    var p1=new Promise(function(r){fetch(U).then(function(x){return x.ok?x.json().then(r):r(null)}).catch(function(){r(null)})});
    var p2=new Promise(function(r){fetch(V).then(function(x){return x.ok?x.json().then(r):r(null)}).catch(function(){r(null)})});
    Promise.all([p1,p2]).then(function(R){var info=R[0],status=R[1];
      if(!info||!info.data||!info.data.stations){RE('Données indisponibles.');return}
      if(!status||!status.data||!status.data.stations){RE('Disponibilités indisponibles.');return}
      var sb={};status.data.stations.forEach(function(s){sb[s.station_id]=s});
      allStations=info.data.stations.map(function(s){var st=sb[s.station_id]||{};return{station_id:s.station_id,name:s.name,lat:s.lat,lon:s.lon,capacity:s.capacity||0,address:s.address||'Saint-Étienne',bikes_available:st.num_bikes_available||0,docks_available:st.num_docks_available||0,distance:Math.round(H(lat,lon,s.lat,s.lon))}});
      document.getElementById('status-text').textContent='Stations à proximité';
      var top3=allStations.slice().sort(function(a,b){return a.distance-b.distance}).slice(0,3);
      stores=top3;RL(top3);RA();UN();UF()})}

  function RL(st){var h='';st.forEach(function(s,i){var bc=s.bikes_available===0?' zero':'';h+='<div class="row" onclick="showDetail('+i+')"><div><div class="row-name">'+E(s.name)+'</div><div class="row-address">'+E(s.address)+'</div></div><div style="display:flex;align-items:center"><div class="row-right"><div class="row-distance">'+s.distance+' m</div><div class="row-bikes'+bc+'">'+s.bikes_available+' vélos</div></div><span class="chevron">›</span></div></div>'});document.getElementById('stations-list').innerHTML=h||'<div class="empty-state">Aucune station.</div>';document.getElementById('stations-count').textContent=st.length}
  function RA(){sortedStations=allStations.slice().sort(function(a,b){return a.name.localeCompare(b.name)});var h='';sortedStations.forEach(function(s,i){var c=favorites[s.station_id]?' checked':'',bc=s.bikes_available===0?' zero':'';h+='<div class="row" onclick="showStationDetail('+i+')"><input type="checkbox" class="fav-cb"'+c+' onclick="toggleFavorite(event,\''+s.station_id+'\')"><div style="flex:1;min-width:0"><div class="row-name">'+E(s.name)+'</div><div class="row-address">'+E(s.address)+' · '+s.distance+' m</div></div><div style="display:flex;align-items:center;flex-shrink:0"><div class="row-right"><div class="row-bikes'+bc+'">'+s.bikes_available+' vélos</div></div></div></div>'});document.getElementById('all-stations-list').innerHTML=h;document.getElementById('all-count').textContent=sortedStations.length}
  function RF(){var fs=allStations.filter(function(s){return favorites[s.station_id]}),card=document.getElementById('favs-card');if(fs.length===0){card.classList.add('hidden');return}card.classList.remove('hidden');fs.sort(function(a,b){return a.distance-b.distance});var h='';fs.forEach(function(s){var bc=s.bikes_available===0?' zero':'';h+='<div class="row" onclick="showFavDetail(\''+s.station_id+'\')"><div style="flex:1;min-width:0"><div class="row-name">'+E(s.name)+'</div><div class="row-address">'+E(s.address)+' · '+s.distance+' m</div></div><div class="row-right"><div class="row-bikes'+bc+'">'+s.bikes_available+' vélos</div></div></div>'});document.getElementById('favs-list').innerHTML=h;document.getElementById('favs-count').textContent=fs.length}
  function UN(){var fs=allStations.filter(function(s){return favorites[s.station_id]}),fi={};fs.forEach(function(s){fi[s.station_id]=true});var nr=allStations.filter(function(s){return !fi[s.station_id]});nr.sort(function(a,b){return a.distance-b.distance});var c=fs.concat(nr).slice(0,3);if(c.length>0){stores=c;RL(stores)}}
  function FD(s){document.getElementById('detail-name').textContent=s.name;document.getElementById('detail-address').textContent=s.address;document.getElementById('detail-distance').textContent=s.distance+' m';document.getElementById('detail-bikes').textContent=s.bikes_available;document.getElementById('detail-docks').textContent=s.docks_available;document.getElementById('detail-capacity').textContent=s.capacity;document.getElementById('main-panel').classList.add('hidden');document.getElementById('detail-panel').classList.remove('hidden')}
  function showDetail(i){var s=stores[i];if(s)FD(s)}
  function showStationDetail(i){var s=sortedStations[i];if(s)FD(s)}
  function showFavDetail(id){var s=allStations.find(function(st){return st.station_id===id});if(s)FD(s)}
  function hideDetail(){document.getElementById('detail-panel').classList.add('hidden');document.getElementById('main-panel').classList.remove('hidden')}
  function RE(m){document.getElementById('stations-list').innerHTML='<div class="empty-state">'+E(m)+'</div>';document.getElementById('stations-count').textContent='0'}
  function TA(){var l=document.getElementById('all-stations-list'),a=document.getElementById('all-arrow');if(l.style.display==='none'){l.style.display='block';a.textContent='▲'}else{l.style.display='none';a.textContent='▼'}}
  function TF(e,id){e.stopPropagation();if(favorites[id])delete favorites[id];else favorites[id]=true;S();UF();UN();RA()}
  function UF(){var c=Object.keys(favorites).length;document.getElementById('fav-count').textContent=c>0?c+' favori'+(c>1?'s':''):'';RF()}
  window.showDetail=showDetail;window.showStationDetail=showStationDetail;window.showFavDetail=showFavDetail;window.hideDetail=hideDetail;window.loadStations=loadStations;window.toggleAllStations=TA;window.toggleFavorite=TF;
  L();loadStations();setInterval(function(){if(!document.getElementById('main-panel').classList.contains('hidden'))loadStations()},60000);
})();
</script>
</body>
</html>
